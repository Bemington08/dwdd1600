<!doctype html>
<html lang="en">
<head>
    <meta name="description" content="Get your next meal delivered by drone.">
    
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@200;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="delivery.css">
    
    <meta charset="UTF-8">
    <title>Drone Delivery Services LLC.</title>
</head>
<body>
    <!-- start the page header -->
    <header>
        <span>Drone Delivery</span>
    </header>
    
    <!-- start the page navigation -->
    <nav>
        <ul>
            <li><a href="index.html">About Us</a></li>
            <li class="active"><a href="delivery.html">Request a Delivery</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </nav>
    
    <!-- start the page main -->
    <main>
        <h1>Request a Delivery</h1>
        <form method="get" class="myForm" action="thanks.html">

            <fieldset>
            <legend>Customer Information</legend>
            <label>First Name*<input type="text" name="fname" required></label>
            <label>Last Name*<input type="text" name="lname" required></label>
            <label>Cell Number*<input type="tel" name="phone" required placeholder="987-555-1234"></label>
            </fieldset>

            <fieldset>
            <legend>Delivery Method</legend>
                <label><input type="radio" name="method" value="mail">Mail Truck (2-3 days)</label>
                <label><input type="radio" name="method" value="air">Airplane (1-2 days)</label>
                <label><input type="radio" name="method" value="sea">Submarine (4-6 days)</label>
            </fieldset>

            <fieldset>
            <legend>Delivery Options</legend>
                <label><input type="checkbox" name="yard" value="chosen">Front Yard</label>
                <label><input type="checkbox" name="side" value="chosen">Side Yard</label>
                <label><input type="checkbox" name="back" value="chosen">Back Yard</label>
                <label><input type="checkbox" name="door" value="chosen">Front Door</label>

                <label>Prefered Delivery Time
                <select name="time">
                <option value="none">Please Select</option>
                <option value="morning">6:00am - 11:00am</option>
                <option value="afternoon">12:00pm - 4:00pm</option>
                <option value="evening">5:00pm - 8:00pm</option>
                <option value="night">8:00pm - 11:00pm</option>
                </select>
                </label>
            </fieldset>

            <label>Comments
                <textarea name="comments"></textarea>
            </label>

            <input type="submit" value="Send Deliery request">
        </form>
    </main>
    
    <!-- start the page footer -->
    <footer>
        <p>&copy;2026 &bull; Drone Delivery Services &bull; <a href="mailto:zen@gmail.com">Email Us</a> </p>
    </footer>
</body>
</html>
