<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Remington Estes">
    <meta name="description" content="Share your experience with Subnautica.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="icon" type="images/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="guides.css">
    <title>Subnautica Guides: Forms</title>
</head>
<body>
    <!-- Start the page head -->
    <header>
        <img src="small_subnautica_icon.webp" alt="Logo for Subnautica Guides" width="50" height="50">
        <span>Subnautica Guides</span>
    </header>

    <!-- Start the page head -->
    <nav>
        <ul>
            <li><a href="index.html">Overview</a></li>
            <li><a href="gameplay.html">Gameplay</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li class="active"><a href="forms.html">Forms</a></li>
            
        </ul>
    </nav>
    <!-- start the page main -->
    <main>
        <h1>Request a Delivery</h1>
        <form method="get" class="myForm" action="thanks.html">

            <fieldset>
            <legend>Information</legend>
            <label>Gamer Tag*<input type="text" name="fname" required></label>
            <label>Hours Played*<input type="tel" name="hours" required placeholder="300+"></label>
            </fieldset>

            <fieldset>
            <legend>Prefered Game Mode</legend>
                <label><input type="radio" name="method" value="Survival">Survival</label>
                <label><input type="radio" name="method" value="Freedom">Freedom</label>
                <label><input type="radio" name="method" value="Hardcore">Hardcore</label>
                <label><input type="radio" name="method" value="Creative">Creative</label>
            </fieldset>

            <fieldset>
            <legend>Favorite Locations</legend>
                <label><input type="checkbox" name="shallows" value="chosen">Safe Shallows</label>
                <label><input type="checkbox" name="kelp" value="chosen">Kelp Forest</label>
                <label><input type="checkbox" name="plateaus" value="chosen">Grassy Plateaus</label>
                <label><input type="checkbox" name="grand" value="chosen">Grand Reef</label>
                <label><input type="checkbox" name="sparse" value="chosen">Sparse Reef</label>
                <label><input type="checkbox" name="blood" value="chosen">Blood Kelp</label>
                <label><input type="checkbox" name="mushroom" value="chosen">Mushroom Forest</label>
                <label><input type="checkbox" name="dunes" value="chosen">Dunes</label>
                <label><input type="checkbox" name="crag" value="chosen">Crag Field</label>
                <label><input type="checkbox" name="crash" value="chosen">Crash Site</label>
                <label><input type="checkbox" name="mountains" value="chosen">Mountains</label>
                <label><input type="checkbox" name="bulb" value="chosen">Bulb Zone</label>
                <label><input type="checkbox" name="cave" value="chosen">Jellyshroom Cave</label>
                <label><input type="checkbox" name="treader" value="chosen">Sea Treader's Path</label>
                <label><input type="checkbox" name="lost" value="chosen">Lost River</label>
                <label><input type="checkbox" name="inactive" value="chosen">Inactive Lava Zone</label>
                <label><input type="checkbox" name="lava" value="chosen">Lava Lakes</label>

                <label>Time of Day
                <select name="time">
                <option value="none">Please Select</option>
                <option value="morning">Sunrise</option>
                <option value="afternoon">Mid-day</option>
                <option value="evening">Sunset</option>
                <option value="night">Eclipse</option>
                </select>
                </label>
            </fieldset>

            <label>Details
                <textarea name="Details"></textarea>
            </label>

            <input type="submit" value="Send Deliery request">
        </form>
    </main>
    
    <!-- start the page footer -->
    <footer>
        <p>&copy; 2026 &bull; Remington Estes &bull; Web Essentials</p>
    </footer>
</body>
</html>
